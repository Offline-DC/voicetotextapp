# Beta release workflow — port of the launcher's, simplified for a PUBLIC
# single repo. Push a tag like `v1.1-beta1` and this builds + signs the APK
# and publishes it as a GitHub *pre-release* that the launcher's beta channel
# picks up. Uses the same signing secrets as the other Offline-DC apps.
name: Beta Release

on:
  push:
    tags:
      - 'v*-beta*'
      - 'v*-rc*'
      - 'v*-alpha*'

concurrency:
  group: beta-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create the release + upload the APK

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Verify tag is a prerelease
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" != *-* ]]; then
            echo "::error::Tag $TAG has no '-' suffix; this workflow only handles prerelease tags (vX.Y-beta.N / -rc.N / -alpha.N)."
            exit 1
          fi
          echo "Building prerelease for tag: $TAG"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "${{ github.workspace }}/keystore.jks"

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Locate and rename APK
        id: apk
        run: |
          SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$SRC" ]; then
            echo "::error::No APK found under app/build/outputs/apk/release"
            exit 1
          fi
          cp "$SRC" "${{ github.workspace }}/voicetotext-beta.apk"
          echo "sha256=$(sha256sum "${{ github.workspace }}/voicetotext-beta.apk" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Parse version code
        id: version
        # UpdateChecker.parseRelease expects `version_code=<int>` on its own line
        # in the release body. Pull it straight from build.gradle.kts.
        run: |
          echo "code=$(grep 'versionCode' app/build.gradle.kts | grep -oP '\d+' | head -1)" >> "$GITHUB_OUTPUT"

      - name: Verify signature
        run: |
          BT="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)"
          "$BT/apksigner" verify --verbose "${{ github.workspace }}/voicetotext-beta.apk"

      - name: Create GitHub Release (prerelease)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: true
          body: |
            version_code=${{ steps.version.outputs.code }}
            sha256=${{ steps.apk.outputs.sha256 }}

            ⚠️ Beta build of on-device voice-to-text. Opt into beta-tester mode on the launcher (long-press "updates" in All Apps) to receive it.
          files: voicetotext-beta.apk

      - name: Clean up keystore
        if: always()
        run: rm -f "${{ github.workspace }}/keystore.jks"
